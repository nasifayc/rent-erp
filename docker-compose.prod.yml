services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rent-erp-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
    networks:
      - rent-erp

  web:
    image: nginx:1.27-alpine
    container_name: rent-erp-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - rent-erp

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rent-erp-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
    command: ["/bin/sh", "-lc", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    networks:
      - rent-erp

networks:
  rent-erp:
    driver: bridge

